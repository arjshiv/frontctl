name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-15
    env:
      KEYCHAIN_PATH: "$RUNNER_TEMP/frontctl-release.keychain-db"
      FRONTCTL_NOTARIZE: "1"
      FRONTCTL_DOWNLOAD_BASE_URL: "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
      DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      DEVELOPER_ID_INSTALLER: ${{ secrets.DEVELOPER_ID_INSTALLER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - name: Import Developer ID certificates
        env:
          DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          DEVELOPER_ID_INSTALLER_CERT_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT_BASE64 }}
          DEVELOPER_ID_INSTALLER_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        run: |
          set -eu
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_APPLICATION_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id-application.p12"
          echo "$DEVELOPER_ID_INSTALLER_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id-installer.p12"
          security import "$RUNNER_TEMP/developer-id-application.p12" -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_APPLICATION_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security import "$RUNNER_TEMP/developer-id-installer.p12" -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_INSTALLER_CERT_PASSWORD" -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      - run: npm run release:doctor
      - run: npm run build:package
      - run: npm run release:check
      - run: npm run release:homebrew-cask
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
          files: |
            dist/package/frontctl-*.pkg
            dist/package/frontctl-*.dmg
            dist/package/frontctl-*-manifest.json
            dist/package/frontctl.rb
